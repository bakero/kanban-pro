name: Vercel Deployment Tests

on:
  deployment_status:

jobs:
  e2e:
    if: ${{ github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Resolve deployment URL
        id: url
        run: |
          echo "url=${{ github.event.deployment_status.environment_url }}" >> $GITHUB_OUTPUT
      - name: Run E2E on Preview
        if: ${{ github.event.deployment_status.environment == 'Preview' }}
        env:
          E2E_BASE_URL: ${{ steps.url.outputs.url }}
        run: npm run test:e2e
      - name: Run Regression on Production
        if: ${{ github.event.deployment_status.environment == 'Production' }}
        env:
          E2E_BASE_URL: ${{ steps.url.outputs.url }}
        run: npm run test:regression
